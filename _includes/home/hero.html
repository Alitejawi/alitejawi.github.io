{%- assign p = site.data.profile -%}
<section class="home-identity">
  <p class="home-mlabel">{{ p.role_label }}</p>
  <h1 class="home-name">{{ p.name }}</h1>
  <p class="home-oneliner-display">{{ p.oneliner }}</p>

  <div class="home-stats">
    {%- for stat in p.stats -%}
      <span class="home-stat">{{ stat }}</span>
    {%- endfor -%}
  </div>

  <p class="home-stack">{{ p.stack | join: " · " }}</p>

  <div class="home-ctas">
    <a class="home-cta-primary" href="{{ p.cta.primary.href }}">
      {{ p.cta.primary.label }}
    </a>
    <a class="home-cta-secondary" href="{{ p.cta.secondary.href }}" rel="me noopener">
      {{ p.cta.secondary.label }}
    </a>
    <a class="home-cta-tertiary" href="{{ p.cta.tertiary.href }}" rel="me noopener" target="_blank">
      {{ p.cta.tertiary.label }}
    </a>
  </div>
</section>
